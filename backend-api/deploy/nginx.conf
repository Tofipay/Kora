# ============================================================
# قمهد لايف — Nginx server block (API host: api.tofi-xtv.com)
# Document root: /var/www/qamhad-live/public
# HOST-ADAPTIVE: serves the API host itself, no cross-host redirect.
# ============================================================

# ---- HTTP → HTTPS on the SAME host (path + query preserved) ----
server {
    listen 80;
    server_name api.tofi-xtv.com tofi-xtv.com www.tofi-xtv.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.tofi-xtv.com tofi-xtv.com www.tofi-xtv.com;

    root /var/www/qamhad-live/public;
    index index.php;

    # ssl_certificate     /etc/letsencrypt/live/api.tofi-xtv.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/api.tofi-xtv.com/privkey.pem;

    charset utf-8;
    client_max_body_size 8m;

    gzip on;
    gzip_comp_level 5;
    gzip_types text/css application/javascript application/json image/svg+xml application/manifest+json text/xml application/xml;

    # ---- CORS for the JSON API (harmless for the native app; helps web/debug) ----
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # ---- Block application internals (defence in depth) ----
    location ~ ^/(app|storage|database|deploy|docs)/ { deny all; }
    location ~ /\.(?!well-known) { deny all; }

    # ---- Static assets: long cache ----
    location ~* \.(css|js|svg|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
    location ~* \.(png|jpe?g|webp|ico)$ {
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri /index.php?$query_string;
    }

    # ---- Media proxy (cacheable at CDN/edge) ----
    location /media/ {
        try_files $uri /index.php?$query_string;
    }

    # ---- First-party JSON proxy: /api/*.php execute directly via FPM ----
    location ^~ /api/ {
        location ~ /_boot\.php$ { deny all; }       # bootstrap is include-only
        try_files $uri =404;
        location ~ \.php$ {
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_pass unix:/run/php/php8.2-fpm.sock;
        }
    }

    # ---- Clean URLs → front controller ----
    location / {
        try_files $uri /index.php?$query_string;
    }

    location = /index.php {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root/index.php;
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;   # adjust to your PHP-FPM socket
    }

    # Legacy *.php URLs → front controller issues the 301 to the clean URL
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root/index.php;
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
    }
}
