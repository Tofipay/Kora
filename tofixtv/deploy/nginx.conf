# ============================================================
# ALOKA Live — Nginx server block (DOMAIN-AGNOSTIC)
# Document root: /var/www/aloka-live/public
# server_name is a catch-all: deploy on ANY domain with zero edits.
# Replace "_" with your domain(s) only if this box hosts other sites.
# ============================================================

# ---- HTTP → HTTPS on the SAME host (one hop, path preserved) ----
server {
    listen 80 default_server;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2 default_server;
    server_name _;

    root /var/www/aloka-live/public;
    index index.php;

    # ssl_certificate     /etc/letsencrypt/live/aloka-code.shop/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/aloka-code.shop/privkey.pem;

    charset utf-8;
    client_max_body_size 8m;

    gzip on;
    gzip_comp_level 5;
    gzip_types text/css application/javascript application/json image/svg+xml application/manifest+json text/xml application/xml;

    # ---- Security headers ----
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # ---- Block application internals (defence in depth) ----
    location ~ ^/(app|storage|database|deploy|docs)/ { deny all; }
    location ~ /\. { deny all; }

    # ---- Static assets: long cache ----
    location ~* \.(css|js|svg|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
    location ~* \.(png|jpe?g|webp|ico)$ {
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri /index.php?$query_string;
    }

    # ---- Media proxy (cacheable at CDN/edge) ----
    location /media/ {
        try_files $uri /index.php?$query_string;
    }

    # ---- First-party JSON proxy: /api/*.php execute directly via FPM ----
    location ^~ /api/ {
        location ~ /_boot\.php$ { deny all; }       # bootstrap is include-only
        try_files $uri =404;
        location ~ \.php$ {
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_pass unix:/run/php/php8.2-fpm.sock;
        }
    }

    # ---- Clean URLs → front controller ----
    location / {
        try_files $uri /index.php?$query_string;
    }

    location = /index.php {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root/index.php;
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;   # adjust to your PHP-FPM socket
    }

    # Legacy *.php URLs → front controller issues the 301 to the clean URL
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root/index.php;
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
    }
}
