name: Android Release Build

# Builds a signed Release APK and an AAB (Play Store bundle) and uploads them
# as workflow artifacts. Runs on every push touching the android/ project and
# can be triggered manually. GitHub-hosted runners have the Android SDK and
# access to Google's Maven, so the real binaries are produced here.

on:
  push:
    branches: [ "**" ]
    paths:
      - "android/**"
      - ".github/workflows/android-release.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}

      - name: Build Release APK
        run: ./gradlew :app:assembleRelease --no-daemon --stacktrace

      - name: Build Release AAB (Play Store bundle)
        run: ./gradlew :app:bundleRelease --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TofiXTV-release-apk
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: TofiXTV-release-aab
          path: android/app/build/outputs/bundle/release/*.aab
          if-no-files-found: error
